name: Build Windows Installer

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.0.0)'
        required: true
        default: '2.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Next.js standalone
        run: bun run build

      - name: Run build script
        run: ./installer/build-portable.sh

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: RKWebMonitor-${{ github.event.inputs.version || github.ref_name }}-setup
          path: download/RKWebMonitor-*-setup.exe
          retention-days: 90

      - name: Upload portable.zip
        uses: actions/upload-artifact@v4
        with:
          name: RKWebMonitor-${{ github.event.inputs.version || github.ref_name }}-portable
          path: download/RKWebMonitor-*-portable.zip
          retention-days: 90

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            download/RKWebMonitor-*-setup.exe
            download/RKWebMonitor-*-portable.zip
